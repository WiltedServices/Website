  <script>
    const _cfg = window.PROFILE_CONFIG;
    if (_cfg.avatar) {
      document.getElementById('avatar').src = _cfg.avatar;
    }
  </script>
  <script src="profile.js"></script>
  <script>
    if (window.PROFILE_CONFIG && window.PROFILE_CONFIG.avatar) {
      const avatarEl = document.getElementById('avatar');
      const observer = new MutationObserver(() => {
        if (avatarEl.src !== window.PROFILE_CONFIG.avatar &&
            !avatarEl.src.endsWith(window.PROFILE_CONFIG.avatar.replace('../', ''))) {
          avatarEl.src = window.PROFILE_CONFIG.avatar;
        }
      });
      observer.observe(avatarEl, { attributes: true, attributeFilter: ['src'] });
    }
  </script>
